<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L炎炎ノ消防隊2 設定判別ツール</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="app">
    
    <!-- パスワード認証画面 -->
    <div v-if="!authenticated" class="fixed inset-0 bg-gray-900 flex items-center justify-center p-4 z-50">
      <div class="bg-gray-800 p-8 rounded-xl border border-orange-500 w-full max-w-sm shadow-2xl">
        <h2 class="text-orange-500 text-xl font-bold mb-6 text-center">アクセス制限中</h2>
        <input type="password" v-model="inputPass" placeholder="パスワードを入力" class="w-full p-3 mb-4 bg-gray-900 border border-gray-600 rounded text-white text-center font-bold focus:ring-2 focus:ring-orange-500 focus:outline-none">
        <button @click="checkPassword" class="w-full bg-orange-600 hover:bg-orange-500 py-3 rounded text-white font-bold transition-all active:scale-95">認証して開く</button>
        <p v-if="error" class="text-red-400 text-xs mt-4 text-center font-bold">パスワードが違います</p>
      </div>
    </div>

    <!-- メインアプリ本体 -->
    <div v-else class="p-3 pb-10 select-none max-w-md mx-auto space-y-4">
      <!-- (元のHTMLの内容をここに展開します) -->
      <!-- [※元のコードと同じため省略しますが、ここに先ほどのコード本体を配置] -->
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;

    createApp({
      setup() {
        const authenticated = ref(false);
        const inputPass = ref('');
        const error = ref(false);

        const checkPassword = () => {
          if (inputPass.value === 'ラートム6842') {
            authenticated.value = true;
          } else {
            error.value = true;
          }
        };

        // --- 以下、元のコードの setup 内の変数をすべて記載 ---
        // (省略：実際のファイルでは元のスクリプトをここに入れてください)
        
        return { 
          authenticated, inputPass, error, checkPassword,
          /* ...元のスクリプトでreturnしていた変数群... */
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
