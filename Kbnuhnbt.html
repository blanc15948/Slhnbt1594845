
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L甲鉄城のカバネリ 海門決戦 設定判別ツール</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; background: #2d2d2d; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { text-align: center; font-size: 1.3rem; color: #ff5500; border-bottom: 2px solid #ff5500; padding-bottom: 10px; margin-top: 0; }
        .section { margin-bottom: 20px; padding: 15px; background: #3a3a3a; border-radius: 6px; }
        .section-title { font-weight: bold; font-size: 1.05rem; margin-bottom: 10px; color: #ffaa00; border-left: 4px solid #ffaa00; padding-left: 8px; }
        .input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .input-group label { flex: 1; font-size: 0.85rem; padding-right: 5px; }
        .counter-controls { display: flex; align-items: center; }
        .btn-count { width: 35px; height: 35px; background: #555; color: #fff; border: none; font-size: 1.2rem; cursor: pointer; border-radius: 4px; }
        .btn-count:active { background: #777; }
        input[type="number"] { width: 65px; height: 31px; text-align: center; margin: 0 5px; background: #222; color: #fff; border: 1px solid #666; border-radius: 4px; font-size: 1rem; }
        .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
        .checkbox-group label { display: flex; align-items: center; font-size: 0.85rem; cursor: pointer; }
        .checkbox-group input { margin-right: 10px; width: 18px; height: 18px; }
        .btn-calc { width: 100%; height: 50px; background: #ff5500; color: #fff; border: none; border-radius: 6px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-calc:hover { background: #ff7722; }
        #result { margin-top: 20px; padding: 15px; background: #222; border-radius: 6px; border: 1px solid #ff5500; display: none; }
        .result-title { font-weight: bold; font-size: 1.2rem; color: #ff5500; text-align: center; margin-bottom: 15px; }
        .result-bar-container { margin-bottom: 12px; }
        .result-label { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 4px; }
        .progress-box { background: #444; border-radius: 10px; overflow: hidden; height: 16px; width: 100%; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #ff7700, #ffaa00); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1>L甲鉄城のカバネリ 海門決戦<br>設定判別ツール</h1>

    <div class="section">
        <div class="section-title">ゲーム数 & 初当たりカウント</div>
        <div class="input-group">
            <label>通常ゲーム数</label>
            <input type="number" id="normal_g" value="0" min="0">
        </div>
        <div class="input-group">
            <label>CZ初当たり回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('cz_count', -1)">-</button>
                <input type="number" id="cz_count" value="0" min="0">
                <button class="btn-count" onclick="changeVal('cz_count', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>初当たりボーナス回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('bonus_count', -1)">-</button>
                <input type="number" id="bonus_count" value="0" min="0">
                <button class="btn-count" onclick="changeVal('bonus_count', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>ST初当たり回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('st_count', -1)">-</button>
                <input type="number" id="st_count" value="0" min="0">
                <button class="btn-count" onclick="changeVal('st_count', 1)">+</button>
            </div>
        </div>
        <hr style="border: 0; border-top: 1px solid #555; margin: 10px 0;">
        <div class="input-group">
            <label>総マイスロG数 (通常+AT)</label>
            <input type="number" id="total_g" value="0" min="0">
        </div>
        <div class="input-group">
            <label>下段ベル回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('bell_count', -1)">-</button>
                <input type="number" id="bell_count" value="0" min="0">
                <button class="btn-count" onclick="changeVal('bell_count', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="section" style="background: #2b3a4a;">
        <div class="section-title" style="color: #44bbff; border-left-color: #44bbff;">通常時 チャンス目発光（低確時）</div>
        <div class="input-group">
            <label>チャンス目 引いた回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('ch_total', -1)">-</button>
                <input type="number" id="ch_total" value="0" min="0">
                <button class="btn-count" onclick="changeVal('ch_total', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>低確時 発光した回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('ch_flash', -1)">-</button>
                <input type="number" id="ch_flash" value="0" min="0">
                <button class="btn-count" onclick="changeVal('ch_flash', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">規定周期での当選状況</div>
        <div class="input-group">
            <label>3周期目 到達回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('cycle3_total', -1)">-</button>
                <input type="number" id="cycle3_total" value="0" min="0">
                <button class="btn-count" onclick="changeVal('cycle3_total', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>3周期目 ボーナス当選回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('cycle3_win', -1)">-</button>
                <input type="number" id="cycle3_win" value="0" min="0">
                <button class="btn-count" onclick="changeVal('cycle3_win', 1)">+</button>
            </div>
        </div>
        <hr style="border: 0; border-top: 1px solid #555; margin: 10px 0;">
        <div class="input-group">
            <label>4周期目 到達回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('cycle4_total', -1)">-</button>
                <input type="number" id="cycle4_total" value="0" min="0">
                <button class="btn-count" onclick="changeVal('cycle4_total', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>4周期目 ボーナス当選回数</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('cycle4_win', -1)">-</button>
                <input type="number" id="cycle4_win" value="0" min="0">
                <button class="btn-count" onclick="changeVal('cycle4_win', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">おみくじ「小吉」の出現状況</div>
        <div class="checkbox-group">
            <label><input type="checkbox" id="omi_1"> 1回目に小吉</label>
            <label><input type="checkbox" id="omi_2"> 2回目に小吉</label>
            <label><input type="checkbox" id="omi_3"> 3回目に小吉</label>
            <label><input type="checkbox" id="omi_4"> 4回目に小吉</label>
            <label><input type="checkbox" id="omi_5"> 5回目に小吉</label>
        </div>
    </div>

    <div class="section">
        <div class="section-title">BB中 技術介入ボイス (青7サンド)</div>
        <div class="input-group" style="background: #4a2211; padding: 6px; border-radius: 4px; margin-bottom: 12px;">
            <label style="font-weight: bold; color: #ffaa00;">ボイスなし（無音）</label>
            <div class="counter-controls">
                <button class="btn-count" style="background:#883311;" onclick="changeVal('v_none', -1)">-</button>
                <input type="number" id="v_none" value="0" min="0">
                <button class="btn-count" style="background:#aa4422;" onclick="changeVal('v_none', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>男性ボイス (奇数示唆)</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('v_male', -1)">-</button>
                <input type="number" id="v_male" value="0" min="0">
                <button class="btn-count" onclick="changeVal('v_male', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>女性ボイス (偶数示唆)</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('v_female', -1)">-</button>
                <input type="number" id="v_female" value="0" min="0">
                <button class="btn-count" onclick="changeVal('v_female', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>景之ボイス (高設定示唆・小)</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('v_kage_s', -1)">-</button>
                <input type="number" id="v_kage_s" value="0" min="0">
                <button class="btn-count" onclick="changeVal('v_kage_s', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>景之ボイス (高設定示唆・中)</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('v_kage_m', -1)">-</button>
                <input type="number" id="v_kage_m" value="0" min="0">
                <button class="btn-count" onclick="changeVal('v_kage_m', 1)">+</button>
            </div>
        </div>
        <div class="input-group">
            <label>景之ボイス (高設定示唆・大)</label>
            <div class="counter-controls">
                <button class="btn-count" onclick="changeVal('v_kage_l', -1)">-</button>
                <input type="number" id="v_kage_l" value="0" min="0">
                <button class="btn-count" onclick="changeVal('v_kage_l', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">確定演出のチェック</div>
        <div class="checkbox-group">
            <label><input type="checkbox" id="fix_6"> 6確定</label>
            <label><input type="checkbox" id="fix_5"> 5以上確定</label>
            <label><input type="checkbox" id="fix_4"> 4以上確定</label>
            <label><input type="checkbox" id="fix_2"> 2以上確定</label>
        </div>
    </div>

    <button class="btn-calc" onclick="calculateSettings()">設定を推測する</button>

    <div id="result">
        <div class="result-title">📊 設定推測結果</div>
        <div id="result-bars"></div>
    </div>
</div>

<script>
function changeVal(id, amount) {
    const el = document.getElementById(id);
    let val = parseInt(el.value) || 0;
    val += amount;
    if (val < 0) val = 0;
    el.value = val;
}

function calculateSettings() {
    const normalG = parseInt(document.getElementById('normal_g').value) || 0;
    const czCount = parseInt(document.getElementById('cz_count').value) || 0;
    const bonusCount = parseInt(document.getElementById('bonus_count').value) || 0;
    const stCount = parseInt(document.getElementById('st_count').value) || 0;

    const totalG = parseInt(document.getElementById('total_g').value) || 0;
    const bellCount = parseInt(document.getElementById('bell_count').value) || 0;

    // チャンス目発光カウント
    const chTotal = parseInt(document.getElementById('ch_total').value) || 0;
    const chFlash = parseInt(document.getElementById('ch_flash').value) || 0;
    
    const cycle3Total = parseInt(document.getElementById('cycle3_total').value) || 0;
    const cycle3Win = parseInt(document.getElementById('cycle3_win').value) || 0;
    const cycle4Total = parseInt(document.getElementById('cycle4_total').value) || 0;
    const cycle4Win = parseInt(document.getElementById('cycle4_win').value) || 0;

    // おみくじフラグ
    const omi1 = document.getElementById('omi_1').checked;
    const omi2 = document.getElementById('omi_2').checked;
    const omi3 = document.getElementById('omi_3').checked;
    const omi4 = document.getElementById('omi_4').checked;
    const omi5 = document.getElementById('omi_5').checked;
    
    const vNone = parseInt(document.getElementById('v_none').value) || 0;
    const vMale = parseInt(document.getElementById('v_male').value) || 0;
    const vFemale = parseInt(document.getElementById('v_female').value) || 0;
    const vKageS = parseInt(document.getElementById('v_kage_s').value) || 0;
    const vKageM = parseInt(document.getElementById('v_kage_m').value) || 0;
    const vKageL = parseInt(document.getElementById('v_kage_l').value) || 0;

    // 確定フラグ
    const fix6 = document.getElementById('fix_6').checked;
    const fix5 = document.getElementById('fix_5').checked;
    const fix4 = document.getElementById('fix_4').checked;
    const fix2 = document.getElementById('fix_2').checked;

    let score = { 1: 100, 2: 100, 3: 100, 4: 100, 5: 100, 6: 100 };

    // 一発確定・除外の処理
    if (fix6) { score[1]=0; score[2]=0; score[3]=0; score[4]=0; score[5]=0; score[6]=10000; }
    else if (fix5) { score[1]=0; score[2]=0; score[3]=0; score[4]=0; score[5]=5000; score[6]=5000; }
    else if (fix4) { score[1]=0; score[2]=0; score[3]=0; score[4]=3333; score[5]=3333; score[6]=3333; }
    else if (fix2) { score[1]=0; }

    // ボイスなしが1回でもあれば設定5・6濃厚
    if (vNone > 0) {
        score[1]=0; score[2]=0; score[3]=0; score[4]=0;
        if (score[5] === 0 && score[6] === 0) {
            score[5]=500; score[6]=500;
        }
    }

    // 1. CZ初当たり確率
    if (normalG > 100 && czCount > 0) {
        const czProbs = { 1: 247.9, 2: 238.0, 3: 228.0, 4: 218.0, 5: 210.0, 6: 195.6 };
        const actualProb = normalG / czCount;
        for (let set = 1; set <= 6; set++) {
            if (score[set] === 0) continue;
            const diff = Math.abs(actualProb - czProbs[set]);
            score[set] *= Math.exp(-diff * 0.08);
        }
    }

    // 2. 初当たりボーナス確率
    if (normalG > 100 && bonusCount > 0) {
        const bonusProbs = { 1: 254.2, 2: 242.3, 3: 239.6, 4: 214.0, 5: 203.2, 6: 195.1 };
        const actualProb = normalG / bonusCount;
        for (let set = 1; set <= 6; set++) {
            if (score[set] === 0) continue;
            const diff = Math.abs(actualProb - bonusProbs[set]);
            score[set] *= Math.exp(-diff * 0.08);
        }
    }

    // 3. ST確率
    if (normalG > 100 && stCount > 0) {
        const stProbs = { 1: 422.5, 2: 405.9, 3: 398.7, 4: 357.2, 5: 332.6, 6: 318.5 };
        const actualProb = normalG / stCount;
        for (let set = 1; set <= 6; set++) {
            if (score[set] === 0) continue;
            const diff = Math.abs(actualProb - stProbs[set]);
            score[set] *= Math.exp(-diff * 0.05);
        }
    }

    // 4. 下段ベル確率
    if (totalG > 100 && bellCount > 0) {
        const bellProbs = { 1: 121.1, 2: 114.4, 3: 112.8, 4: 106.2, 5: 104.2, 6: 99.1 };
        const actualProb = totalG / bellCount;
        for (let set = 1; set <= 6; set++) {
            if (score[set] === 0) continue;
            const diff = Math.abs(actualProb - bellProbs[set]);
            score[set] *= Math.exp(-diff * 0.15); 
        }
    }

    // 5. チャンス目発光確率
    if (chTotal > 0) {
        const flashRates = { 1: 0.07, 2: 0.08, 3: 0.09, 4: 0.11, 5: 0.13, 6: 0.15 };
        for (let set = 1; set <= 6; set++) {
            if (score[set] === 0) continue;
            const expectedFlash = chTotal * flashRates[set];
            const diff = Math.abs(chFlash - expectedFlash);
            score[set] *= Math.exp(-diff * 2.0);
        }
    }

    // 6. 周期抽選
    if (cycle3Total > 0) {
        const cycle3Rates = { 1: 0.184, 2: 0.238, 3: 0.211, 4: 0.285, 5: 0.324, 6: 0.371 };
        for (let set = 1; set <= 6; set++) {
            if (score[set] === 0) continue;
            const expectedWin = cycle3Total * cycle3Rates[set];
            const diff = Math.abs(cycle3Win - expectedWin);
            score[set] *= Math.exp(-diff * 2.5);
        }
    }
    if (cycle4Total > 0) {
        const cycle4Rates = { 1: 0.336, 2: 0.352, 3: 0.363, 4: 0.402, 5: 0.434, 6: 0.469 };
        for (let set = 1; set <= 6; set++) {
            if (score[set] === 0) continue;
            const expectedWin = cycle4Total * cycle4Rates[set];
            const diff = Math.abs(cycle4Win - expectedWin);
            score[set] *= Math.exp(-diff * 2.5);
        }
    }

    // 7. おみくじ小吉ロジック
    if (omi1) { score[6] *= 2.0; }
    if (omi2) { score[2] *= 1.5; score[6] *= 1.5; }
    if (omi3) { score[3] *= 1.5; score[6] *= 1.5; }
    if (omi4) { score[4] *= 1.5; score[6] *= 1.5; }
    if (omi5) { score[5] *= 1.5; score[6] *= 1.5; }

    const omiSubCount = (omi2 ? 1 : 0) + (omi3 ? 1 : 0) + (omi4 ? 1 : 0) + (omi5 ? 1 : 0);
    if (omi1 && omiSubCount >= 2) {
        if (score[6] > 0) { score[6] *= 10.0; }
    }

    // 8. ボイス確率分配（男：女が1:1に近いほど設定1が上昇するよう調整）
    const totalVoice = vNone + vMale + vFemale + vKageS + vKageM + vKageL;
    if (totalVoice > 0) {
        // 設定1は男女がほぼ1:1(0.435:0.435)の基本設計
        const voiceDist = {
            1: { none: 0.000, male: 0.435, female: 0.435, kageS: 0.130, kageM: 0.004, kageL: 0.001 },
            2: { none: 0.000, male: 0.300, female: 0.565, kageS: 0.130, kageM: 0.004, kageL: 0.001 },
            3: { none: 0.000, male: 0.520, female: 0.330, kageS: 0.140, kageM: 0.008, kageL: 0.002 },
            4: { none: 0.000, male: 0.320, female: 0.490, kageS: 0.150, kageM: 0.030, kageL: 0.010 },
            5: { none: 0.005, male: 0.445, female: 0.310, kageS: 0.160, kageM: 0.050, kageL: 0.030 },
            6: { none: 0.010, male: 0.380, female: 0.380, kageS: 0.180, kageM: 0.050, kageL: 0.050 } 
        };

        for (let set = 1; set <= 6; set++) {
            if (score[set] === 0) continue;
            let p = 1;
            if (vNone > 0)   p *= Math.pow(voiceDist[set].none, vNone);
            if (vMale > 0)   p *= Math.pow(voiceDist[set].male, vMale);
            if (vFemale > 0) p *= Math.pow(voiceDist[set].female, vFemale);
            if (vKageS > 0)  p *= Math.pow(voiceDist[set].kageS, vKageS);
            if (vKageM > 0)  p *= Math.pow(voiceDist[set].kageM, vKageM);
            if (vKageL > 0)  p *= Math.pow(voiceDist[set].kageL, vKageL);
            score[set] *= p * 10000;
        }

        // 男性の回数と女性の回数が拮抗（1:1）している場合、設定1の評価を上乗せ
        const mfTotal = vMale + vFemale;
        if (mfTotal >= 2) {
            const ratio = Math.min(vMale, vFemale) / Math.max(vMale, vFemale); // 1.0に近づくほど完全な1:1
            if (ratio >= 0.7 && score[1] > 0) {
                score[1] *= (1 + ratio * 1.5); // 1:1に近いほど設定1倍率アップ
            }
        }
    }

    let totalScore = 0;
    for (let set = 1; set <= 6; set++) totalScore += score[set];

    const resultDiv = document.getElementById('result');
    const barsContainer = document.getElementById('result-bars');
    barsContainer.innerHTML = '';

    if (totalScore === 0) {
        barsContainer.innerHTML = '<p style="text-align:center; color:#ff3333;">矛盾する入力データ、またはゲーム数が足りません。</p>';
        resultDiv.style.display = 'block';
        return;
    }

    resultDiv.style.display = 'block';

    for (let set = 1; set <= 6; set++) {
        const pct = ((score[set] / totalScore) * 100).toFixed(1);
        
        const barBox = document.createElement('div');
        barBox.className = 'result-bar-container';
        barBox.innerHTML = `
            <div class="result-label">
                <span>設定 ${set}</span>
                <span>${pct}%</span>
            </div>
            <div class="progress-box">
                <div class="progress-bar" style="width: ${pct}%"></div>
            </div>
        `;
        barsContainer.appendChild(barBox);
    }
}
</script>
</body>
</html>
